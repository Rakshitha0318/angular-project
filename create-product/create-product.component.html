<div class="row">
  <div class="col-8 mx-auto">

    <form [formGroup]="productForm" (ngSubmit)="createProduct()">

      <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-control" formControlName="productname">
      </div>

      <div class="mb-3">
        <label class="form-label">Product Image</label>
        <input type="file" class="form-control"(change)="selectFile($event)">
      </div>

    
        <div class="mb-3">
        <label class="form-label">Product Price</label>
        <input type="text" class="form-control" formControlName="productprice">
      </div>

        <div class="mb-3">
        <label class="form-label">Product Title</label>
        <input type="text" class="form-control" formControlName="producttitle">
      </div>
        <div class="mb-3">
        <label class="form-label">Product Description</label>
        <textarea class="form-control" formControlName="productdescription" ></textarea>
      </div>
      
      
      <button type="submit" class="btn btn-primary">
        Submit
      </button>
      <button type="button"class="btn btn-info" (click)="goback()">GoBack</button>

    </form>

  </div>
</div>
